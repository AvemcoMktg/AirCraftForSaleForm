<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AVEMCO Quote</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="form-wrapper">
  <div class="form-card">
 <img src="avemco-logo.png" alt="Avemco logo" class="thank-you-logo">
    <h2>Get an Aircraft Insurance Quote!</h2>
    <p class="sub">It takes less than 60 seconds</p>

    <p class="required-note"><span>*</span> Required fields</p>

    <form id="avemco-quote-form" action="https://formspree.io/f/xwvyqleg" method="POST">

      <!-- Optional Formspree settings -->
      <input type="hidden" name="_subject" value="New AVEMCO Quote Request">
      <input type="hidden" name="_captcha" value="true">

      <!-- Honeypot spam protection -->
      <input type="text" name="_gotcha" class="hidden" tabindex="-1" autocomplete="off">

      <!-- Name -->
      <div class="row">
        <div class="field-group">
          <label for="first-name">First Name <span class="required">*</span></label>
          <input id="first-name" type="text" name="first_name" placeholder="First Name" required>
        </div>

        <div class="field-group">
          <label for="last-name">Last Name <span class="required">*</span></label>
          <input id="last-name" type="text" name="last_name" placeholder="Last Name" required>
        </div>
      </div>

      <!-- Contact -->
      <div class="row">
        <div class="field-group">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input id="phone" type="tel" name="phone" placeholder="Phone Number" required>
        </div>

        <div class="field-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input id="email" type="email" name="email" placeholder="Email Address" required>
        </div>
      </div>

      <!-- Aircraft -->
      <div class="row">
        <div class="field-group">
          <label for="base-airport">Base Airport</label>
          <input id="base-airport" type="text" name="base_airport" placeholder="Base Airport (Identifier)">
        </div>

        <div class="field-group">
          <label for="aircraft-year">Aircraft Year</label>
          <input id="aircraft-year" type="number" name="aircraft_year" placeholder="Aircraft Year">
        </div>
      </div>

      <div class="row">
        <div class="field-group">
          <label for="aircraft-make">Aircraft Make</label>
          <input id="aircraft-make" type="text" name="aircraft_make" placeholder="Aircraft Make">
        </div>

        <div class="field-group">
          <label for="aircraft-model">Aircraft Model</label>
          <input id="aircraft-model" type="text" name="aircraft_model" placeholder="Aircraft Model">
        </div>
      </div>

      <!-- Value -->
      <div class="row">
        <div class="field-group full-width">
          <label for="value-requested">Value Requested</label>
          <input id="value-requested" type="number" name="value_requested" placeholder="Value Requested">
        </div>
      </div>

      <button id="submit-button" type="submit">Get My Quote</button>

    </form>

    <p id="form-error" class="form-error" style="display: none;">
      There was a problem submitting your information. Please try again.
    </p>

  </div>
</div>

<script>
  const form = document.getElementById("avemco-quote-form");
  const submitButton = document.getElementById("submit-button");
  const formError = document.getElementById("form-error");

  form.addEventListener("submit", async function (event) {
    event.preventDefault();

    formError.style.display = "none";
    submitButton.disabled = true;
    submitButton.textContent = "Submitting...";

    try {
      const response = await fetch(form.action, {
        method: form.method,
        body: new FormData(form),
        headers: {
          "Accept": "application/json"
        }
      });

      if (response.ok) {
        window.location.href = "thank-you.html";
      } else {
        formError.style.display = "block";
        submitButton.disabled = false;
        submitButton.textContent = "Get My Quote";
      }
    } catch (error) {
      formError.style.display = "block";
      submitButton.disabled = false;
      submitButton.textContent = "Get My Quote";
    }
  });
</script>

</body>
</html>
