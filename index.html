<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AVEMCO Quote</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="form-wrapper">
  <div class="form-card">

    <h2>Get an Aircraft Insurance Quote!</h2>
    <p class="sub">It takes less than 60 seconds</p>

    <form id="avemco-quote-form" action="https://formspree.io/f/xwvyqleg" method="POST">

      <!-- Optional Formspree settings -->
      <input type="hidden" name="_subject" value="New AVEMCO Quote Request">
      <input type="hidden" name="_captcha" value="true">

      <!-- Honeypot spam protection -->
      <input type="text" name="_gotcha" class="hidden" tabindex="-1" autocomplete="off">

      <!-- Name -->
      <div class="row">
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
      </div>

      <!-- Contact -->
      <div class="row">
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <input type="email" name="email" placeholder="Email Address" required>
      </div>

      <!-- Aircraft -->
      <div class="row">
        <input type="text" name="base_airport" placeholder="Base Airport (Identifier)">
        <input type="number" name="aircraft_year" placeholder="Aircraft Year">
      </div>

      <div class="row">
        <input type="text" name="aircraft_make" placeholder="Aircraft Make">
        <input type="text" name="aircraft_model" placeholder="Aircraft Model">
      </div>

      <!-- Value -->
      <div class="row">
        <input type="number" name="value_requested" placeholder="Value Requested">
      </div>

      <button id="submit-button" type="submit">Get My Quote</button>

    </form>

    <p id="form-error" class="form-error" style="display: none;">
      There was a problem submitting your information. Please try again.
    </p>

  </div>
</div>

<script>
  const form = document.getElementById("avemco-quote-form");
  const submitButton = document.getElementById("submit-button");
  const formError = document.getElementById("form-error");

  form.addEventListener("submit", async function (event) {
    event.preventDefault();

    formError.style.display = "none";
    submitButton.disabled = true;
    submitButton.textContent = "Submitting...";

    try {
      const response = await fetch(form.action, {
        method: form.method,
        body: new FormData(form),
        headers: {
          "Accept": "application/json"
        }
      });

      if (response.ok) {
        window.location.href = "thank-you.html";
      } else {
        formError.style.display = "block";
        submitButton.disabled = false;
        submitButton.textContent = "Get My Quote";
      }
    } catch (error) {
      formError.style.display = "block";
      submitButton.disabled = false;
      submitButton.textContent = "Get My Quote";
    }
  });
</script>

</body>
</html>
